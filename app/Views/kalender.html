  <div class="max-w-[860px] mx-auto p-4 sm:p-6 pb-12 pt-6">

      <div id="calGrid" class="grid grid-cols-7 gap-1 sm:gap-2">
        <!-- Cells generated by JS -->
      </div>
      
      <hr class="my-4 border-gray-200 dark:border-white/10">
      
      <div class="flex flex-col gap-2 mt-4">
          <label class="flex items-center space-x-2 cursor-pointer w-fit">
              <input type="checkbox" id="cbIstikmal1" class="w-4 h-4 text-brand bg-gray-100 border-gray-300 rounded focus:ring-brand dark:focus:ring-brand/50 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
              <span id="lblIstikmal1" class="text-sm font-medium text-gray-600 dark:text-gray-400">Bulan istikmal 1</span>
          </label>
          <label class="flex items-center space-x-2 cursor-pointer w-fit">
              <input type="checkbox" id="cbIstikmal2" class="w-4 h-4 text-brand bg-gray-100 border-gray-300 rounded focus:ring-brand dark:focus:ring-brand/50 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
              <span id="lblIstikmal2" class="text-sm font-medium text-gray-600 dark:text-gray-400">Bulan istikmal 2</span>
          </label>
          <div id="calHijriTitleBottom" class="text-sm font-medium text-brand dark:text-brand/80 mt-2"></div>

    </div>

    <!-- Peristiwa Penting List -->
    <div class="mt-6 bg-white dark:bg-[#0a1128] border border-gray-200 dark:border-white/10 rounded-3xl p-6 sm:p-8 shadow-sm">
      <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-4 flex items-center gap-2">
        <span class="text-xl">📅</span> Peristiwa Penting Bulan Ini
      </h3>
      <div id="monthEventsList" class="space-y-3">
        <!-- Event list generated by JS -->
      </div>
    </div>
  </div>

  <!-- Modal Event -->
  <div id="evShade" class="fixed inset-0 bg-black/60 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300 z-[100] flex items-center justify-center p-4 sm:p-6">
    <div id="evModal" class="w-full max-w-md bg-white dark:bg-[#0a1128] rounded-2xl flex flex-col opacity-0 scale-95 transition-all duration-300 shadow-2xl overflow-hidden" onclick="event.stopPropagation()">
      <div class="p-5 border-b border-gray-200 dark:border-white/10 bg-gray-50 dark:bg-white/5 flex items-center justify-between">
        <h3 class="font-bold text-lg text-gray-900 dark:text-white" id="evDateTitle">Tanggal</h3>
        <button id="evClose" class="w-8 h-8 flex items-center justify-center rounded-xl bg-gray-200 dark:bg-white/10 hover:bg-gray-300 dark:hover:bg-white/20 transition-colors text-gray-600 dark:text-gray-300">✕</button>
      </div>
      <div class="p-5 overflow-y-auto max-h-[60vh]">
        <h4 class="font-semibold text-gray-900 dark:text-white mb-3">Formulir Event</h4>
        <input type="hidden" id="evDate">
        <input type="hidden" id="evId">
        <div class="mb-3">
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nama Event</label>
          <input type="text" id="evLabel" class="w-full bg-gray-50 dark:bg-white/5 border border-gray-300 dark:border-white/10 rounded-xl px-4 py-2 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand/50 transition-all">
        </div>
        <div class="mb-3">
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tipe Pengulangan</label>
          <select id="evType" class="w-full bg-gray-50 dark:bg-white/5 border border-gray-300 dark:border-white/10 rounded-xl px-4 py-2 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand/50 transition-all">
            <option value="NONE">Hanya sekali</option>
            <option value="WEEKLY">Setiap minggu</option>
            <option value="MONTHLY">Setiap bulan masehi</option>
            <option value="MONTHLY_HIJRI">Setiap bulan hijriyah</option>
            <option value="YEARLY">Setiap tahun masehi</option>
            <option value="YEARLY_HIJRI">Setiap tahun hijriyah</option>
            <option value="SELAPANAN">Selapanan (35 hari)</option>
          </select>
        </div>
      </div>
      <div class="p-4 border-t border-gray-200 dark:border-white/10 bg-gray-50 dark:bg-white/5 flex justify-end">
        <button id="evSave" class="px-5 py-2 rounded-xl bg-brand hover:bg-emerald-600 text-white font-bold transition-all shadow-lg shadow-brand/30 active:scale-95">Simpan</button>
      </div>
    </div>
  </div>

  <!-- Modal Hapus -->
  <div id="delShade" class="fixed inset-0 bg-black/60 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300 z-[100] flex items-center justify-center p-4 sm:p-6">
    <div id="delModal" class="w-full max-w-sm bg-white dark:bg-[#0a1128] rounded-2xl flex flex-col opacity-0 scale-95 transition-all duration-300 shadow-2xl overflow-hidden" onclick="event.stopPropagation()">
      <div class="p-5 border-b border-gray-200 dark:border-white/10 bg-gray-50 dark:bg-white/5 flex items-center justify-between">
        <h3 class="font-bold text-lg text-gray-900 dark:text-white">Opsi Hapus</h3>
        <button id="delClose" class="w-8 h-8 flex items-center justify-center rounded-xl bg-gray-200 dark:bg-white/10 hover:bg-gray-300 dark:hover:bg-white/20 transition-colors text-gray-600 dark:text-gray-300">✕</button>
      </div>
      <div class="p-5 flex flex-col gap-3">
        <p class="text-sm text-gray-600 dark:text-gray-400 mb-2">Event ini berulang. Apa yang ingin Anda hapus?</p>
        <button id="btnDelSingle" class="w-full text-left px-4 py-3 rounded-xl bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-white/10 hover:bg-red-50 dark:hover:bg-red-500/10 hover:border-red-200 dark:hover:border-red-500/20 hover:text-red-600 dark:hover:text-red-400 transition-colors text-sm font-semibold">
           Hapus event pada tanggal ini saja
        </button>
        <button id="btnDelAll" class="w-full text-left px-4 py-3 rounded-xl bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-white/10 hover:bg-red-50 dark:hover:bg-red-500/10 hover:border-red-200 dark:hover:border-red-500/20 hover:text-red-600 dark:hover:text-red-400 transition-colors text-sm font-semibold">
           Hapus event dan semua pengulangannya
        </button>
      </div>
    </div>
  </div>

  <script>
    (() => {
      let currentDate = new Date();
      let activeMonth = currentDate.getMonth();
      let activeYear = currentDate.getFullYear();
      let allEvents = [];
      let isLoadingEvents = true;

      const pasaranNames = ["Legi", "Pahing", "Pon", "Wage", "Kliwon"];
      const hijriMonths = ["Muharram", "Safar", "Rabiul Awal", "Rabiul Akhir", "Jumadil Awal", "Jumadil Akhir", "Rajab", "Sya'ban", "Ramadan", "Syawal", "Dzulqa'dah", "Dzulhijjah"];
      const masehiMonths = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

      function getPasaran(date) {
        const target = Date.UTC(date.getFullYear(), date.getMonth(), date.getDate());
        const ref = Date.UTC(1945, 7, 17); // 17 Aug 1945 was Friday Legi (0)
        let diffDays = Math.floor((target - ref) / 86400000);
        let p = diffDays % 5;
        if (p < 0) p += 5;
        return p;
      }

      function getIstikmalMonths() {
        try {
            return JSON.parse(localStorage.getItem('istikmal_months') || '[]');
        } catch {
            return [];
        }
      }

      function setIstikmalMonths(arr) {
          localStorage.setItem('istikmal_months', JSON.stringify(arr));
          // Clear cache when settings change
          for (let key in actualStartCache) delete actualStartCache[key];
      }

      function isIstikmal(date) {
        const set = getIstikmalMonths();
        const hParts = getHijriPartsNative(date);
        let mBase = hParts.hMonth;
        let yBase = hParts.hYear;
        // Check current month (this month's istikmal affects next month)
        return set.includes(`${yBase}-${mBase}`);
      }

      function getHijriPartsNative(date) {
        const formatter = new Intl.DateTimeFormat('id-ID-u-ca-islamic-umalqura', {day: 'numeric', month: 'numeric', year: 'numeric'});
        const parts = formatter.formatToParts(date);
        let hDay = 1, hMonth = 0, hYear = 1445;
        parts.forEach(p => {
            if (p.type === 'day') hDay = parseInt(p.value);
            if (p.type === 'month') hMonth = parseInt(p.value) - 1;
            if (p.type === 'year') hYear = parseInt(p.value.split(' ')[0]);
        });
        return { hDay, hMonth, hYear };
      }

      const nativeStartCache = {};
      function getNativeStart(hYear, hMonth) {
          while (hMonth > 11) { hYear++; hMonth -= 12; }
          while (hMonth < 0) { hYear--; hMonth += 12; }
          const key = `${hYear}-${hMonth}`;
          if (nativeStartCache[key]) return nativeStartCache[key];
      
          const diffMonths = (hYear - 1445) * 12 + (hMonth - 0);
          const approxDays = Math.floor(diffMonths * 29.530588);
          let d = new Date(2023, 6, 19 + approxDays, 12, 0, 0);
          
          let parts = getHijriPartsNative(d);
          
          function compare(pYear, pMonth, targetYear, targetMonth) {
              if (pYear !== targetYear) return pYear - targetYear;
              return pMonth - targetMonth;
          }
      
          let cmp = compare(parts.hYear, parts.hMonth, hYear, hMonth);
          
          if (cmp === 0) {
              while (true) {
                  d.setDate(d.getDate() - 1);
                  parts = getHijriPartsNative(d);
                  if (compare(parts.hYear, parts.hMonth, hYear, hMonth) < 0) {
                      d.setDate(d.getDate() + 1);
                      break;
                  }
              }
          } else if (cmp < 0) {
              while (true) {
                  d.setDate(d.getDate() + 1);
                  parts = getHijriPartsNative(d);
                  if (compare(parts.hYear, parts.hMonth, hYear, hMonth) === 0) {
                      break;
                  }
              }
          } else {
              while (true) {
                  d.setDate(d.getDate() - 1);
                  parts = getHijriPartsNative(d);
                  if (compare(parts.hYear, parts.hMonth, hYear, hMonth) === 0) {
                      while (true) {
                          d.setDate(d.getDate() - 1);
                          parts = getHijriPartsNative(d);
                          if (compare(parts.hYear, parts.hMonth, hYear, hMonth) < 0) {
                              d.setDate(d.getDate() + 1);
                              break;
                          }
                      }
                      break;
                  }
              }
          }
          
          d.setHours(0,0,0,0);
          const time = d.getTime();
          nativeStartCache[key] = time;
          return time;
      }
      
      function getNativeLength(hYear, hMonth) {
          const s1 = getNativeStart(hYear, hMonth);
          const s2 = getNativeStart(hYear, hMonth + 1);
          return Math.round((s2 - s1) / 86400000);
      }
      
      function getDesiredLength(y, m) {
          const set = getIstikmalMonths();
          if (set.includes(`${y}-${m}`)) return 30;
          if (m === 11) return 29; // Dzulhijjah default 29 jika tidak istikmal
          return getNativeLength(y, m);
      }
      
      const actualStartCache = {};
      function getActualStart(hYear, hMonth) {
          while (hMonth > 11) { hYear++; hMonth -= 12; }
          while (hMonth < 0) { hYear--; hMonth += 12; }
          const key = `${hYear}-${hMonth}`;
          if (actualStartCache[key]) return actualStartCache[key];
      
          let cy = hYear;
          // Gunakan bulan 5 (Jumadil Akhir) sebagai anchor agar bulan 4 (Jumadil Awal) yang menjadi penyerap pergeseran.
          // Hal ini menjaga agar Muharram dan bulan-bulan penting lainnya tetap memiliki jumlah hari yang utuh.
          if (hMonth < 5) cy = hYear - 1; 
          
          let t = getNativeStart(cy, 5);
          let y = cy;
          let m = 5;
          
          while (y < hYear || (y === hYear && m < hMonth)) {
              t += getDesiredLength(y, m) * 86400000;
              m++;
              if (m > 11) { y++; m = 0; }
          }
          
          actualStartCache[key] = t;
          return t;
      }

      function getHijriParts(date) {
        let native = getHijriPartsNative(date);
        let y = native.hYear;
        let m = native.hMonth;
        
        let dTime = new Date(date).setHours(0,0,0,0);
        
        while (true) {
            let start = getActualStart(y, m);
            let nextStart = getActualStart(y, m + 1);
            
            if (dTime < start) {
                m--;
                if (m < 0) { y--; m = 11; }
            } else if (dTime >= nextStart) {
                m++;
                if (m > 11) { y++; m = 0; }
            } else {
                let hDay = Math.round((dTime - start) / 86400000) + 1;
                return { hDay, hMonth: m, hYear: y };
            }
        }
      }

      function fetchEvents() {
        fetch('/api/events')
          .then(res => res.json())
          .then(res => {
            if (res.ok) {
              allEvents = res.data;
            }
            isLoadingEvents = false;
            renderCalendar();
          })
          .catch(e => {
            console.error('Failed fetching events', e);
            isLoadingEvents = false;
            renderCalendar();
          });
      }

      function generateDailyEvents(date) {
        const events = [];
        const y = date.getFullYear();
        const m = date.getMonth();
        const d = date.getDate();
        const pasaran = getPasaran(date);
        const dayOfWeek = date.getDay();
        const { hDay, hMonth, hYear } = getHijriParts(date);

        // Custom JSON events
        allEvents.forEach(ev => {
           let matches = false;
           const sY = ev.startYear, sM = ev.startMonth, sD = ev.startDay;
           const startCal = new Date(sY, sM, sD);
           startCal.setHours(0,0,0,0);
           const currentCal = new Date(y, m, d);
           currentCal.setHours(0,0,0,0);
           
           // Relax the start date for Hijri events to accommodate -1 day shifts from Istikmal
           const checkStartCal = new Date(startCal.getTime());
           if (ev.type.includes('HIJRI')) checkStartCal.setDate(checkStartCal.getDate() - 2);

           if (currentCal.getTime() >= checkStartCal.getTime()) {
             switch (ev.type) {
               case 'NONE': matches = (y === sY && m === sM && d === sD); break;
               case 'WEEKLY': matches = (dayOfWeek === startCal.getDay()); break;
               case 'MONTHLY': matches = (d === sD); break;
               case 'MONTHLY_HIJRI': matches = (hDay === ev.startHijriDay); break;
               case 'YEARLY': matches = (m === sM && d === sD); break;
               case 'YEARLY_HIJRI': matches = (hMonth === ev.startHijriMonth && hDay === ev.startHijriDay); break;
               case 'SELAPANAN': matches = (dayOfWeek === startCal.getDay() && pasaran === getPasaran(startCal)); break;
             }
           }
           if (matches && ev.exceptions) {
             const y = date.getFullYear();
             const mStr = String(date.getMonth() + 1).padStart(2, '0');
             const dStr = String(date.getDate()).padStart(2, '0');
             if (ev.exceptions.includes(`${y}-${mStr}-${dStr}`)) {
               matches = false;
             }
           }
           if (matches) {
             let isHol = ev.id.startsWith('ev_m_') || ev.id.startsWith('ev_h_') || ev.id.startsWith('ev_p_');
             events.push({ label: ev.label, isHoliday: isHol, isCustom: true, id: ev.id, rawType: ev.type, dateStr: `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}` });
           }
        });

        return events;
      }

      function renderCalendar() {
        document.getElementById('calTitle').innerText = `${masehiMonths[activeMonth]} ${activeYear}`;
        const grid = document.getElementById('calGrid');
        grid.innerHTML = '';

        const firstDay = new Date(activeYear, activeMonth, 1);
        const daysInMonth = new Date(activeYear, activeMonth + 1, 0).getDate();
        const startDayOfWeek = firstDay.getDay();

        // Update cbIstikmal state for two checkboxes
        const cbIstikmal1 = document.getElementById('cbIstikmal1');
        const lblIstikmal1 = document.getElementById('lblIstikmal1');
        const cbIstikmal2 = document.getElementById('cbIstikmal2');
        const lblIstikmal2 = document.getElementById('lblIstikmal2');
        // Get Hijri months at start and end of the current Gregorian month
        const startOfMonth = new Date(activeYear, activeMonth, 1);
        const endOfMonth = new Date(activeYear, activeMonth + 1, 0);
        const hPartsStart = getHijriParts(startOfMonth);
        const hPartsEnd = getHijriParts(endOfMonth);
        
        let hijriTitle = `${hijriMonths[hPartsStart.hMonth]} ${hPartsStart.hYear} H`;
        if (hPartsStart.hMonth !== hPartsEnd.hMonth || hPartsStart.hYear !== hPartsEnd.hYear) {
            if (hPartsStart.hYear === hPartsEnd.hYear) {
                hijriTitle = `${hijriMonths[hPartsStart.hMonth]} - ${hijriMonths[hPartsEnd.hMonth]} ${hPartsStart.hYear} H`;
            } else {
                hijriTitle = `${hijriMonths[hPartsStart.hMonth]} ${hPartsStart.hYear} H - ${hijriMonths[hPartsEnd.hMonth]} ${hPartsEnd.hYear} H`;
            }
        }
        document.getElementById('calHijriTitle').innerText = hijriTitle;
        document.getElementById('calHijriTitleBottom').innerText = hijriTitle;
        
        // First checkbox: Current Hijri month at start (affects next month)
        const monthKey1 = `${hPartsStart.hYear}-${hPartsStart.hMonth}`;
        // Second checkbox: Current Hijri month at end (affects next month)
        const monthKey2 = `${hPartsEnd.hYear}-${hPartsEnd.hMonth}`;
        const istikmalSet = getIstikmalMonths();
        
        cbIstikmal1.onchange = null;
        cbIstikmal1.checked = istikmalSet.includes(monthKey1);
        lblIstikmal1.innerText = `Bulan (${hijriMonths[hPartsStart.hMonth]} ${hPartsStart.hYear} H) istikmal`;
        
        cbIstikmal1.onchange = function() {
            let currentSet = getIstikmalMonths();
            if (this.checked) {
                if (!currentSet.includes(monthKey1)) currentSet.push(monthKey1);
            } else {
                currentSet = currentSet.filter(x => x !== monthKey1);
            }
            setIstikmalMonths(currentSet);
            renderCalendar();
        };

        cbIstikmal2.onchange = null;
        cbIstikmal2.checked = istikmalSet.includes(monthKey2);
        lblIstikmal2.innerText = `Bulan (${hijriMonths[hPartsEnd.hMonth]} ${hPartsEnd.hYear} H) istikmal`;
        
        cbIstikmal2.onchange = function() {
            let currentSet = getIstikmalMonths();
            if (this.checked) {
                if (!currentSet.includes(monthKey2)) currentSet.push(monthKey2);
            } else {
                currentSet = currentSet.filter(x => x !== monthKey2);
            }
            setIstikmalMonths(currentSet);
            renderCalendar();
        };

        // Empty cells before 1st
        for (let i = 0; i < startDayOfWeek; i++) {
          grid.innerHTML += `<div class="p-2 sm:p-3"></div>`;
        }

        const today = new Date();
        const isCurrentMonth = (today.getMonth() === activeMonth && today.getFullYear() === activeYear);
        const currentDay = today.getDate();

        let allMonthEvents = [];

        for (let i = 1; i <= daysInMonth; i++) {
          const date = new Date(activeYear, activeMonth, i);
          const pIdx = getPasaran(date);
          const pName = pasaranNames[pIdx];
          const { hDay } = getHijriParts(date);
          
          let dayEvents = [];
          if (!isLoadingEvents) {
             dayEvents = generateDailyEvents(date);
             dayEvents.forEach(ev => allMonthEvents.push({ date: i, pName, hDay, ...ev }));
          }
          
          const isSun = (date.getDay() === 0);
          const isJum = (date.getDay() === 5);
          const hasHoliday = dayEvents.some(e => e.isHoliday);
          
          let colorClass = "text-gray-800 dark:text-gray-200";
          if (isSun || hasHoliday) colorClass = "text-red-600 dark:text-red-500 font-bold";
          else if (isJum) colorClass = "text-brand font-bold";
          
          const isToday = (isCurrentMonth && i === currentDay);
          const bgClass = isToday ? "bg-brand/10 border-brand" : "bg-gray-50 dark:bg-white/5 border-transparent hover:border-brand/30";
          
          let dots = "";
          if (dayEvents.length > 0) {
            dots = `<div class="flex flex-wrap gap-1 mt-1 justify-center max-w-[80%] mx-auto">
              ${dayEvents.map(e => `<div class="w-1.5 h-1.5 rounded-full ${e.isHoliday ? 'bg-red-500' : (e.isCustom ? 'bg-blue-500' : 'bg-brand')}"></div>`).join('')}
            </div>`;
          }

          grid.innerHTML += `
            <div class="date-cell border rounded-xl sm:rounded-2xl p-1 sm:p-2 flex flex-col items-center justify-center cursor-pointer transition-all active:scale-95 ${bgClass} ${colorClass}" data-date="${i}">
              <div class="text-xs sm:text-sm text-gray-500 dark:text-gray-400 mb-0.5">${pName}</div>
              <div class="text-lg sm:text-2xl">${i}</div>
              <div class="text-[10px] sm:text-xs text-gray-500 dark:text-gray-400 mt-0.5">${hDay}</div>
              ${dots}
            </div>
          `;
        }

        // Render month events list
        const monthEvList = document.getElementById('monthEventsList');
        monthEvList.innerHTML = '';
        // Deduplicate events that might appear on multiple adjacent days due to Istikmal paradox
          let uniqueEvents = [];
          let seenKeys = new Set();
          allMonthEvents.forEach(ev => {
             let key = ev.id + '-' + ev.hDay + '-' + ev.hMonth;
             if (!seenKeys.has(key)) {
                 seenKeys.add(key);
                 uniqueEvents.push(ev);
             }
          });
          allMonthEvents = uniqueEvents;

          if (allMonthEvents.length === 0) {
           monthEvList.innerHTML = '<div class="text-gray-500 italic text-sm p-4 bg-gray-50 dark:bg-white/5 rounded-xl border border-gray-200 dark:border-white/10 text-center">Tidak ada peristiwa penting di bulan ini.</div>';
        } else {
           allMonthEvents.forEach(ev => {
             let typeColor = ev.isHoliday ? 'bg-red-50 text-red-700 dark:bg-red-500/10 dark:text-red-400 border-red-200 dark:border-red-500/20' : 'bg-gray-50 text-gray-700 dark:bg-white/5 dark:text-gray-300 border-gray-200 dark:border-white/10';
             if (ev.isCustom && !ev.id.startsWith('ev_')) typeColor = 'bg-blue-50 text-blue-700 dark:bg-blue-500/10 dark:text-blue-400 border-blue-200 dark:border-blue-500/20';
             
             let actionBtns = ev.isCustom ? `
               <div class="flex items-center gap-1">
                 <button class="text-blue-500 hover:text-blue-700 p-2 rounded-lg bg-white dark:bg-transparent hover:bg-blue-100 dark:hover:bg-blue-900/40 transition-colors" title="Edit Event" onclick="editEvent('${ev.id}')"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg></button>
                 <button class="text-red-500 hover:text-red-700 p-2 rounded-lg bg-white dark:bg-transparent hover:bg-red-100 dark:hover:bg-red-900/40 transition-colors" title="Hapus Event" onclick="deleteEvent('${ev.id}', '${ev.rawType}', '${ev.dateStr}')"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
               </div>
             ` : '';
             
             monthEvList.innerHTML += `
               <div class="flex items-center justify-between p-3 rounded-xl border ${typeColor}">
                 <div class="flex flex-col">
                   <div class="font-bold text-sm sm:text-base mb-0.5">${ev.label}</div>
                   <div class="text-xs sm:text-sm opacity-80">${ev.date} ${masehiMonths[activeMonth]} ${activeYear} (${ev.pName})</div>
                 </div>
                 ${actionBtns}
               </div>
             `;
           });
        }

        document.querySelectorAll('.date-cell').forEach(cell => {
          cell.addEventListener('click', () => {
            const d = parseInt(cell.getAttribute('data-date'));
            openModal(d);
          });
        });
      }

      document.getElementById('calPrev').addEventListener('click', () => {
        activeMonth--;
        if (activeMonth < 0) { activeMonth = 11; activeYear--; }
        renderCalendar();
      });

      document.getElementById('calNext').addEventListener('click', () => {
        activeMonth++;
        if (activeMonth > 11) { activeMonth = 0; activeYear++; }
        renderCalendar();
      });

      // Modal logic
      const evShade = document.getElementById('evShade');
      const evModal = document.getElementById('evModal');
      let selectedDate = null;

      function openModal(d) {
        selectedDate = new Date(activeYear, activeMonth, d);
        const { hDay, hMonth, hYear } = getHijriParts(selectedDate);
        const pName = pasaranNames[getPasaran(selectedDate)];
        
        document.getElementById('evDateTitle').innerText = `${d} ${masehiMonths[activeMonth]} ${activeYear} / ${hDay} ${hijriMonths[hMonth]} ${hYear} H (${pName})`;
        document.getElementById('evDate').value = selectedDate.getTime();
        document.getElementById('evId').value = '';
        document.getElementById('evLabel').value = '';
        document.getElementById('evType').value = 'NONE';

        evShade.classList.remove('opacity-0', 'pointer-events-none');
        evShade.classList.add('opacity-100', 'pointer-events-auto');
        evModal.classList.remove('opacity-0', 'scale-95');
        evModal.classList.add('opacity-100', 'scale-100');
      }

      function closeModal() {
        evShade.classList.remove('opacity-100', 'pointer-events-auto');
        evShade.classList.add('opacity-0', 'pointer-events-none');
        evModal.classList.remove('opacity-100', 'scale-100');
        evModal.classList.add('opacity-0', 'scale-95');
      }

      document.getElementById('evClose').addEventListener('click', closeModal);
      evShade.addEventListener('click', (e) => { if (e.target === evShade) closeModal(); });

      document.getElementById('evSave').addEventListener('click', () => {
        const id = document.getElementById('evId').value;
        const label = document.getElementById('evLabel').value.trim();
        const type = document.getElementById('evType').value;
        if (!label) return alert("Nama event harus diisi!");
        
        const { hDay, hMonth } = getHijriParts(selectedDate);
        
        const payload = {
          id: id,
          label: label,
          type: type,
          startYear: selectedDate.getFullYear(),
          startMonth: selectedDate.getMonth(),
          startDay: selectedDate.getDate(),
          startHijriDay: hDay,
          startHijriMonth: hMonth
        };

        const btn = document.getElementById('evSave');
        const oldText = btn.innerText;
        btn.innerText = 'Menyimpan...';
        btn.disabled = true;

        const endpoint = id ? '/api/events/update' : '/api/events/add';

        fetch(endpoint, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(res => {
          btn.innerText = oldText;
          btn.disabled = false;
          if (res.ok) {
            document.getElementById('evLabel').value = '';
            document.getElementById('evId').value = '';
            fetchEvents();
            closeModal();
          } else {
            alert(res.error || "Gagal menyimpan");
          }
        })
        .catch(e => {
          btn.innerText = oldText;
          btn.disabled = false;
          alert("Terjadi kesalahan jaringan");
        });
      });

      window.editEvent = function(id) {
         const ev = allEvents.find(e => e.id === id);
         if (!ev) return;
         selectedDate = new Date(ev.startYear, ev.startMonth, ev.startDay);
         const { hDay, hMonth, hYear } = getHijriParts(selectedDate);
         const pName = pasaranNames[getPasaran(selectedDate)];
         
         document.getElementById('evDateTitle').innerText = `${ev.startDay} ${masehiMonths[ev.startMonth]} ${ev.startYear} / ${hDay} ${hijriMonths[hMonth]} ${hYear} H (${pName})`;
         document.getElementById('evDate').value = selectedDate.getTime();
         document.getElementById('evId').value = ev.id;
         document.getElementById('evLabel').value = ev.label;
         document.getElementById('evType').value = ev.type;
         
         evShade.classList.remove('opacity-0', 'pointer-events-none');
         evShade.classList.add('opacity-100', 'pointer-events-auto');
         evModal.classList.remove('opacity-0', 'scale-95');
         evModal.classList.add('opacity-100', 'scale-100');
      };

      const delShade = document.getElementById('delShade');
      const delModal = document.getElementById('delModal');
      let delTargetId = null;
      let delTargetDateStr = null;

      function closeDelModal() {
        delShade.classList.remove('opacity-100', 'pointer-events-auto');
        delShade.classList.add('opacity-0', 'pointer-events-none');
        delModal.classList.remove('opacity-100', 'scale-100');
        delModal.classList.add('opacity-0', 'scale-95');
      }

      document.getElementById('delClose').addEventListener('click', closeDelModal);
      delShade.addEventListener('click', (e) => { if(e.target === delShade) closeDelModal(); });

      function performDelete(endpoint, payload) {
        fetch(endpoint, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(res => {
          if (res.ok) {
            closeDelModal();
            fetchEvents();
          } else {
            alert(res.error || "Gagal memproses");
          }
        });
      }

      document.getElementById('btnDelSingle').addEventListener('click', () => {
         performDelete('/api/events/add_exception', { id: delTargetId, date: delTargetDateStr });
      });

      document.getElementById('btnDelAll').addEventListener('click', () => {
         performDelete('/api/events/delete', { id: delTargetId });
      });

      window.deleteEvent = function(id, type, dateStr) {
        if (type === 'NONE') {
           if (!confirm("Hapus event ini?")) return;
           performDelete('/api/events/delete', { id: id });
        } else {
           delTargetId = id;
           delTargetDateStr = dateStr;
           delShade.classList.remove('opacity-0', 'pointer-events-none');
           delShade.classList.add('opacity-100', 'pointer-events-auto');
           delModal.classList.remove('opacity-0', 'scale-95');
           delModal.classList.add('opacity-100', 'scale-100');
        }
      };

      // Initialization
      fetchEvents();
    })();
  </script>
</template>
