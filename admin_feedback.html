<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Feedback – Mafatihul Akhyar</title>
  <link rel="icon" href="logo.png" type="image/png">
  <style>
    :root{
      --bg:#0b1020;--panel:#0f172a;--card:#111827;--text:#e2e8f0;
      --muted:#94a3b8;--accent:#22c55e;--danger:#ef4444;--line:#ffffff1f;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#17315c 0%,transparent 25%),var(--bg);color:var(--text);font:16px/1.68 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    .wrap{max-width:860px;margin:auto;padding:14px 12px 40px}
    .hero{border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 30px #00000030;padding:16px;background:linear-gradient(135deg,rgba(34,197,94,.12),rgba(15,23,42,.96));margin-bottom:14px}
    .brand{display:flex;align-items:center;gap:12px}
    .brand img{width:50px;height:50px;border-radius:14px;object-fit:contain;background:#ffffff12}
    .eyebrow{color:#86efac;font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
    h1{margin:4px 0 0;font-size:clamp(22px,5vw,30px);line-height:1.15}
    .desc{margin:8px 0 0;color:var(--muted);font-size:15px}
    .nav{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .nav a{display:inline-flex;align-items:center;min-height:40px;padding:8px 14px;border-radius:12px;border:1px solid #22c55e44;background:#ffffff0c;color:var(--text);text-decoration:none;font-weight:700;font-size:14px}
    .nav a:hover{background:#22c55e18}
    
    .tabs{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
    .tab{cursor:pointer;background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:10px 16px;border-radius:12px;font-weight:700;white-space:nowrap;transition:all .2s}
    .tab:hover{background:#ffffff0c}
    .tab.active{background:#22c55e22;border-color:#22c55e66;color:var(--accent)}
    
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 30px #00000020;padding:18px;margin-bottom:14px}
    .list-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px}
    .list-header h2{margin:0;font-size:17px;color:#86efac}
    .count-badge{background:#22c55e22;color:var(--accent);border:1px solid #22c55e44;border-radius:999px;padding:3px 10px;font-size:13px;font-weight:700}
    
    .entry-list{display:grid;gap:12px}
    .entry{display:grid;gap:10px;padding:14px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.03);transition:background .2s}
    .entry:hover{background:rgba(255,255,255,.05)}
    .entry-head{display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:4px}
    .entry-title{font-weight:700;font-size:16px;color:#e2e8f0;word-break:break-word}
    .entry-meta{font-size:13px;color:var(--muted)}
    .entry-body{font-size:15px;line-height:1.6;white-space:pre-wrap;margin:4px 0}
    .entry-file{margin-top:8px;padding:8px 12px;background:#3b82f618;border:1px solid #3b82f633;border-radius:8px;display:inline-block;color:#93c5fd;font-size:14px;text-decoration:none}
    .entry-file:hover{background:#3b82f62a}
    
    .status-badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:12px;font-weight:700;margin-left:8px;vertical-align:middle}
    .status-pending{background:#fbbf2422;color:#fcd34d;border:1px solid #fbbf2444}
    .status-replied{background:#22c55e22;color:#86efac;border:1px solid #22c55e44}
    
    .entry-actions{display:flex;gap:8px;margin-top:10px;justify-content:flex-end}
    .btn-del{cursor:pointer;border:1px solid #ef444455;background:#ef444418;color:#fca5a5;padding:7px 12px;border-radius:10px;font-size:13px;font-weight:700;transition:background .2s}
    .btn-del:hover{background:#ef44442a}
    .btn-reply{cursor:pointer;border:1px solid #3b82f655;background:#3b82f618;color:#93c5fd;padding:7px 12px;border-radius:10px;font-size:13px;font-weight:700;transition:background .2s}
    .btn-reply:hover{background:#3b82f62a}
    .btn:disabled{opacity:.5;cursor:wait}
    
    /* Modal */
    .modal-shade{position:fixed;inset:0;background:#000b;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-shade.show{opacity:1;pointer-events:auto}
    .modal-box{position:fixed;inset:0;z-index:110;display:flex;align-items:center;justify-content:center;padding:12px;pointer-events:none}
    .modal-inner{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 20px 60px #00000060;width:100%;max-width:500px;display:flex;flex-direction:column;transform:translateY(12px);opacity:0;transition:.2s;pointer-events:none}
    .modal-shade.show ~ .modal-box .modal-inner{transform:none;opacity:1;pointer-events:auto}
    .modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line)}
    .modal-head h3{margin:0;font-size:16px;color:#86efac}
    .modal-close{cursor:pointer;background:none;border:1px solid var(--line);color:var(--text);border-radius:8px;padding:4px 10px;font-size:18px;line-height:1}
    .modal-body{padding:16px;display:grid;gap:12px}
    .field{display:grid;gap:5px}
    .field label{font-size:13px;color:var(--muted)}
    textarea{width:100%;padding:11px 13px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--text);font:inherit;outline:none;min-height:160px;resize:vertical}
    textarea:focus{border-color:#22c55e66}
    .modal-foot{padding:12px 16px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
    .btn-save{cursor:pointer;border:1px solid #22c55e66;background:#16a34a2b;color:var(--text);padding:10px 18px;border-radius:12px;font:700 15px/1 inherit;transition:background .2s}
    .btn-save:hover{background:#16a34a44}
    .btn-cancel{cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--muted);padding:10px 14px;border-radius:12px;font:15px/1 inherit}
    
    #replyMsg{font-size:13px;min-height:18px;margin-bottom:8px}
    #replyMsg.ok{color:#86efac}
    #replyMsg.err{color:#fca5a5}
    
    .empty-state{text-align:center;padding:28px;color:var(--muted);font-size:15px}
    .spinner-wrap{display:flex;justify-content:center;padding:20px}
    .spinner{width:28px;height:28px;border:3px solid var(--muted);border-left-color:transparent;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(20px);background:#0f172a;color:#e2e8f0;border:1px solid #ffffff22;padding:10px 16px;border-radius:12px;box-shadow:0 10px 30px #0008;opacity:0;z-index:200;transition:opacity .2s,transform .2s;max-width:88vw;text-align:center;font-size:15px;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<div class="wrap">

  <section class="hero">
    <div class="brand">
      <img src="logo.png" alt="Logo">
      <div>
        <div class="eyebrow">Panel Pengelola</div>
        <h1>Feedback &amp; Usulan</h1>
      </div>
    </div>
    <p class="desc">Baca dan balas masukan dari pengguna (Request, Usulan, File).</p>
    <div class="nav">
      <a href="admin.html">&#8592; Kelola Wirid</a>
      <a href="index.html">&#8592; Beranda</a>
    </div>
  </section>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('usulan', this)">&#128172; Usulan</button>
    <button class="tab" onclick="switchTab('request', this)">&#128214; Request Kitab</button>
    <button class="tab" onclick="switchTab('kirim_file', this)">&#128193; Kiriman File</button>
  </div>

  <div class="card">
    <div class="list-header">
      <h2 id="tabTitle">&#128172; Data Usulan</h2>
      <span class="count-badge" id="countBadge">0 entri</span>
    </div>
    <div id="entryList">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>
  </div>

</div>

<!-- Modal Balas -->
<div class="modal-shade" id="replyShade"></div>
<div class="modal-box">
  <div class="modal-inner">
    <div class="modal-head">
      <h3>&#x2709;&#xFE0F; Balas ke User</h3>
      <button class="modal-close" id="replyClose">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Kirim Balasan Kepada:</label>
        <div id="replyToInfo" style="font-weight:bold;color:#fff;"></div>
      </div>
      <div class="field" style="margin-top:8px">
        <label for="rMessage">Isi Pesan Balasan</label>
        <textarea id="rMessage" placeholder="Tuliskan pesan balasan Anda di sini..."></textarea>
      </div>
      <div id="replyMsg" aria-live="polite"></div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" id="replyCancel">Batal</button>
      <button class="btn-save" id="replySave">Kirim Email</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = './admin_feedback_api.php';
  let currentType = 'usulan';
  let allEntries = [];
  let toastTimer;

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderList(entries) {
    const container = document.getElementById('entryList');
    document.getElementById('countBadge').textContent = entries.length + ' entri';
    
    if (!entries.length) {
      container.innerHTML = '<div class="empty-state">Tidak ada entri.</div>';
      return;
    }
    
    container.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'entry-list';
    
    entries.forEach(d => {
      const row = document.createElement('div');
      row.className = 'entry';
      
      const emailText = d.email ? ` | ${esc(d.email)}` : ' | (Tidak ada email)';
      const statusHtml = (d.status === 'replied') 
        ? '<span class="status-badge status-replied">&#10004; Dibalas</span>' 
        : '<span class="status-badge status-pending">Menunggu</span>';
        
      const content = esc(d.pesan || d.request || '');
      
      let fileHtml = '';
      if (currentType === 'kirim_file' && d.file_name) {
        fileHtml = `<a href="uploads/${esc(d.file_name)}" class="entry-file" target="_blank">&#128190; Download: ${esc(d.file_name)}</a>`;
      }
      
      row.innerHTML = `
        <div class="entry-head">
          <div>
            <div class="entry-title">${esc(d.nama)} ${statusHtml}</div>
            <div class="entry-meta">${esc(d.tanggal)}${emailText}</div>
          </div>
        </div>
        <div class="entry-body">${content}</div>
        ${fileHtml}
        <div class="entry-actions">
          <button class="btn-reply" ${!d.email ? 'disabled title="Email tidak tersedia"' : ''}>&#x2709; Balas Email</button>
          <button class="btn-del">&#x1F5D1; Hapus</button>
        </div>
      `;
      
      const btnReply = row.querySelector('.btn-reply');
      if(d.email) {
          btnReply.onclick = () => openReplyModal(d);
      }
      row.querySelector('.btn-del').onclick = () => deleteEntry(d.id, row);
      
      grid.appendChild(row);
    });
    container.appendChild(grid);
  }

  async function loadEntries() {
    const container = document.getElementById('entryList');
    container.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
    
    try {
      const r = await fetch(`${API}?action=read&type=${currentType}&v=${Date.now()}`);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const j = await r.json();
      allEntries = Array.isArray(j.data) ? j.data : [];
      renderList(allEntries);
    } catch (e) {
      container.innerHTML = '<div class="empty-state">Gagal memuat data.</div>';
    }
  }

  function switchTab(type, btn) {
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    currentType = type;
    
    const titles = {
        'usulan': '&#128172; Data Usulan',
        'request': '&#128214; Data Request Kitab',
        'kirim_file': '&#128193; Data Kiriman File'
    };
    document.getElementById('tabTitle').innerHTML = titles[type];
    
    loadEntries();
  }

  async function deleteEntry(id, rowEl) {
    if (!confirm('Hapus entri ini secara permanen?')) return;
    const btn = rowEl.querySelector('.btn-del');
    btn.disabled = true;
    btn.textContent = '...';
    try {
      const r = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'delete', type: currentType, id: id })
      });
      const j = await r.json();
      if (!j.ok) throw new Error(j.error || 'Gagal');
      allEntries = allEntries.filter(d => d.id !== id);
      renderList(allEntries);
      toast('Entri berhasil dihapus.');
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Hapus';
      toast('Gagal menghapus: ' + err.message);
    }
  }

  /* ─── Modal Balas ──────────────────────────────────────────────────────── */
  const replyShade  = document.getElementById('replyShade');
  const replyClose  = document.getElementById('replyClose');
  const replyCancel = document.getElementById('replyCancel');
  const replySave   = document.getElementById('replySave');
  const replyMsg    = document.getElementById('replyMsg');
  let replyingId    = null;

  function openReplyModal(d) {
    replyingId = d.id;
    document.getElementById('replyToInfo').textContent = `${d.nama} (${d.email})`;
    document.getElementById('rMessage').value = '';
    replyMsg.textContent = '';
    replyMsg.className = '';
    replyShade.classList.add('show');
  }

  function closeReplyModal() {
    replyShade.classList.remove('show');
    replyingId = null;
  }

  replyClose.onclick = closeReplyModal;
  replyCancel.onclick = closeReplyModal;
  replyShade.addEventListener('click', (e) => { if (e.target === replyShade) closeReplyModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeReplyModal(); });

  replySave.onclick = async () => {
    const message = document.getElementById('rMessage').value.trim();
    if (!message) {
      replyMsg.className = 'err';
      replyMsg.textContent = 'Pesan balasan tidak boleh kosong.';
      return;
    }

    replyMsg.className = '';
    replyMsg.textContent = 'Mengirim email...';
    replySave.disabled = true;

    try {
      const r = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'reply', type: currentType, id: replyingId, message: message })
      });
      const j = await r.json();
      if (!j.ok) throw new Error(j.error || 'Gagal mengirim email');

      const idx = allEntries.findIndex(d => d.id === replyingId);
      if (idx !== -1) {
        allEntries[idx].status = 'replied';
      }
      renderList(allEntries);
      toast('Balasan berhasil dikirim.');
      closeReplyModal();
    } catch (err) {
      replyMsg.className = 'err';
      replyMsg.textContent = 'Gagal: ' + err.message;
    } finally {
      replySave.disabled = false;
    }
  };

  // Initial load
  loadEntries();
</script>
</body>
</html>
